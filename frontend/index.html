<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHV Editor - Python Edition</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #282840;
  --surface2: #333355;
  --text: #cdd6f4;
  --text2: #a6adc8;
  --accent: #89b4fa;
  --accent2: #cba6f7;
  --green: #a6e3a1;
  --orange: #fab387;
  --red: #f38ba8;
  --border: #45475a;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 10;
}
#toolbar input[type="file"] { display: none; }
.tb-btn {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
  transition: all 0.15s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--accent); color: #1e1e2e; border-color: var(--accent); }
.tb-btn.accent { background: var(--accent2); color: #1e1e2e; border-color: var(--accent2); }
.tb-btn.success { background: var(--green); color: #1e1e2e; border-color: var(--green); }
.tb-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

/* ── Tab bar ── */
#tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  padding: 10px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Panel ── */
#panels {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.panel {
  display: none;
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
}
.panel.active { display: flex; }

/* ── State Editor Canvas ── */
#canvas-panel { flex-direction: column; }
#canvas-toolbar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 13px;
}
#canvas-toolbar input[type="text"] {
  width: 70px;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
}
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 30px 30px;
  background-color: #181825;
  cursor: grab;
}
#canvas-wrap:active { cursor: grabbing; }
#state-canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}

/* ── Context Menu ── */
#ctx-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 0;
  z-index: 1000;
  display: none;
  min-width: 180px;
  box-shadow: var(--shadow);
}
#ctx-menu .ctx-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
}
#ctx-menu .ctx-item:hover { background: var(--surface2); }
#ctx-menu .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
#ctx-menu .ctx-disabled { color: var(--text2); cursor: default; }

/* ── Data Grids ── */
.table-wrap {
  flex: 1;
  overflow: auto;
  padding: 8px;
}
table.data-grid {
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--mono);
  width: max-content;
  min-width: 100%;
}
table.data-grid th, table.data-grid td {
  border: 1px solid var(--border);
  padding: 4px 8px;
  text-align: center;
  min-width: 50px;
}
table.data-grid th {
  background: var(--surface2);
  color: var(--accent);
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 2;
}
table.data-grid td {
  background: var(--bg);
  color: var(--text);
}
table.data-grid td input {
  width: 60px;
  padding: 3px 4px;
  border: 1px solid transparent;
  border-radius: 3px;
  background: transparent;
  color: var(--text);
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
}
table.data-grid td input:focus {
  outline: none;
  background: var(--surface2);
  border-color: var(--accent);
}

/* ── Strings Editor ── */
#strings-panel {
  flex-direction: row;
}
#string-list {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}
#string-list .str-item {
  padding: 6px 12px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#string-list .str-item:hover { background: var(--surface2); }
#string-list .str-item.active { background: var(--accent); color: #1e1e2e; }
#string-editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}
#string-editor-area .str-toolbar {
  display: flex;
  gap: 6px;
  padding: 8px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
#string-text {
  flex: 1;
  padding: 12px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  border: none;
  outline: none;
  resize: none;
}
#string-stats {
  padding: 6px 12px;
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  border-top: 1px solid var(--border);
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  min-width: 400px;
  max-width: 600px;
  box-shadow: var(--shadow);
}
.modal h3 { margin-bottom: 16px; color: var(--accent); }
.modal textarea {
  width: 100%;
  height: 200px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 13px;
}
.modal .btn-row {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 3000;
  padding: 12px 20px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 14px;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.error { border-color: var(--red); color: var(--red); }
#toast.success { border-color: var(--green); color: var(--green); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <input type="file" id="fileOpenBHV" accept=".bhv">
  <button class="tb-btn" data-i18n="openBHV" onclick="document.getElementById('fileOpenBHV').click()">📂 打开 BHV</button>
  <input type="file" id="fileImportJSON" accept=".json">
  <button class="tb-btn" data-i18n="importJSON" onclick="document.getElementById('fileImportJSON').click()">📥 导入 JSON</button>
  <button class="tb-btn success" data-i18n="exportJSON" onclick="exportJSON()">📤 导出 JSON</button>
  <input type="file" id="fileLoadDebug" accept=".json">
  <button class="tb-btn" data-i18n="loadDebug" onclick="document.getElementById('fileLoadDebug').click()">🐛 载入调试 JSON</button>
  <button class="tb-btn accent" data-i18n="saveBHV" onclick="saveBHV()">💾 保存 BHV</button>
  <div class="tb-sep"></div>
  <button class="tb-btn success" data-i18n="newState" onclick="addNewState()">➕ 新建状态</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-i18n="undoBtn" onclick="undo()">↩ 撤销</button>
  <button class="tb-btn" data-i18n="redoBtn" onclick="redo()">↪ 重做</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="toggleLang()" id="langBtn">🌐 EN</button>
</div>

<!-- Tabs -->
<div id="tab-bar">
  <div class="tab active" data-panel="canvas-panel" data-i18n="tabState">🕸 状态机编辑</div>
  <div class="tab" data-panel="structb-panel" data-i18n="tabStructB">📊 StructB 编辑</div>
  <div class="tab" data-panel="structc-panel" data-i18n="tabStructC">🔢 StructC 编辑 (Hex)</div>
  <div class="tab" data-panel="strings-panel" data-i18n="tabStrings">📝 Strings 编辑</div>
  <div class="tab" data-panel="stateaction-panel" data-i18n="tabStateAction">📋 State Action</div>
</div>

<!-- Panels -->
<div id="panels">

  <!-- State Editor Canvas -->
  <div id="canvas-panel" class="panel active">
    <div id="canvas-toolbar">
      <span data-i18n="filter1">筛选 Anim1 ID:</span>
      <input type="text" id="filterAnim1" placeholder="Anim1">
      <span data-i18n="filter2">Anim2 ID:</span>
      <input type="text" id="filterAnim2" placeholder="Anim2">
<div style="position:relative;display:inline-block">
  <input type="text" id="searchState" data-i18n-placeholder="searchPlaceholder" placeholder="搜索状态名/ID" style="width:150px"
    autocomplete="off">
  <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;width:250px;max-height:200px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:4px;z-index:100;font-size:11px;font-family:var(--mono)"></div>
</div>
      <span style="margin-left:16px" data-i18n="zoom">缩放:</span>
      <span id="zoomLabel">100%</span>
      <button class="tb-btn" onclick="zoomIn()" style="padding:2px 6px;font-size:11px;margin-left:4px">+</button>
      <button class="tb-btn" onclick="zoomOut()" style="padding:2px 6px;font-size:11px">−</button>
      <button class="tb-btn" onclick="zoomFit()" data-i18n="zoomFit" style="padding:2px 8px;font-size:11px;margin-left:8px">⊞ 适应</button>
      <span data-i18n="nodes">| 节点:</span>
      <span id="nodeCount">0</span>
      <span style="margin-left:12px" data-i18n="focus">焦点:</span>
      <select id="focusLevel" style="padding:2px 4px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--text);font-size:11px">
        <option value="0" data-i18n="focusAll">全部</option>
        <option value="1" data-i18n="focus1">1 跳</option>
        <option value="2" selected data-i18n="focus2">2 跳</option>
        <option value="3" data-i18n="focus3">3 跳</option>
      </select>
      <span data-i18n="offset">| 偏移:</span>
      <span id="panInfo">0,0</span>
    </div>
    <div id="canvas-wrap">
      <canvas id="state-canvas"></canvas>
      <canvas id="canvas3d" style="display:none;width:100%;height:100%"></canvas>
      <canvas id="minimap" style="position:absolute;bottom:8px;right:8px;width:180px;height:120px;border:1px solid var(--border);border-radius:4px;background:#181825;cursor:pointer;z-index:5"></canvas>
    </div>
  </div>

  <!-- StructB Panel -->
  <div id="structb-panel" class="panel">
    <div class="table-wrap" id="structb-table-wrap"></div>
  </div>

  <!-- StructC Panel -->
  <div id="structc-panel" class="panel">
    <div class="table-wrap" id="structc-table-wrap"></div>
  </div>

  <!-- Strings Panel -->
  <div id="strings-panel" class="panel">
    <div id="string-list"></div>
    <div id="string-editor-area">
      <div class="str-toolbar">
        <button class="tb-btn" id="strBtnAdd" data-i18n="strAdd">+ 添加</button>
        <button class="tb-btn" id="strBtnDel" data-i18n="strDel">− 删除</button>
        <button class="tb-btn" id="strBtnUp" data-i18n="strUp">↑ 上移</button>
        <button class="tb-btn" id="strBtnDown" data-i18n="strDown">↓ 下移</button>
      </div>
      <textarea id="string-text" data-i18n-placeholder="strPlaceholder" placeholder="选择一个字符串编辑..."></textarea>
      <div id="string-stats" data-i18n="strNotLoaded">未加载</div>
    </div>
  </div>

  <!-- State Action Block Panel -->
  <div id="stateaction-panel" class="panel">
    <div style="padding:8px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)">
      <span style="color:var(--accent);font-size:13px;font-weight:600">State Action Block</span>
      <span style="color:var(--text2);font-size:11px" id="saCount">0 entries</span>
    </div>
    <div class="table-wrap" id="stateaction-table-wrap"></div>
  </div>

</div>

<!-- Context Menu -->
<div id="ctx-menu"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Loading overlay -->
<div id="loading" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:5000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 40px;text-align:center">
    <div style="font-size:24px;margin-bottom:8px">⏳</div>
<div style="color:var(--text)" data-i18n="loading">加载中...</div>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar" style="height:24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text2);flex-shrink:0;gap:16px">
  <span id="sbStates">States: 0</span>
  <span id="sbTrans">Transitions: 0</span>
  <span id="sbConds">Conditions: 0</span>
  <span id="sbSel" style="color:var(--accent)"></span>
  <span id="sbUndo" style="margin-left:auto" data-i18n-title="undoStack"></span>
  <span id="sbFile"></span>
</div>

<!-- Mystery Block Modal -->
<div class="modal-overlay" id="mysteryModal" style="display:none">
  <div class="modal">
    <h3 id="mysteryModalTitle" data-i18n="mysteryTitle">编辑 Mystery Block（逗号分隔的 short）</h3>
    <textarea id="mysteryText"></textarea>
    <div class="btn-row">
      <button class="tb-btn" data-i18n="cancel" onclick="closeMysteryModal()">取消</button>
      <button class="tb-btn accent" data-i18n="apply" onclick="applyMystery()">应用</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// Undo/Redo
let history = [];
let historyIndex = -1;
const MAX_HISTORY = 50;

function pushHistory() {
  if (!model) return;
  if (historyIndex < history.length - 1) {
    history = history.slice(0, historyIndex + 1);
  }
  history.push(JSON.parse(JSON.stringify(model)));
  if (history.length > MAX_HISTORY) history.shift();
  historyIndex = history.length - 1;
}

function undo() {
  if (historyIndex <= 0 || history.length === 0) { toast(t('undoCant'), 'error'); return; }
  historyIndex--;
  model = JSON.parse(JSON.stringify(history[historyIndex]));
  loadModel();
  toast(t('undoDone'), 'success');
}

function redo() {
  if (historyIndex >= history.length - 1) { toast(t('redoCant'), 'error'); return; }
  historyIndex++;
  model = JSON.parse(JSON.stringify(history[historyIndex]));
  loadModel();
  toast(t('redoDone'), 'success');
}

async function api(method, path, body=null) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(API + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({detail: resp.statusText}));
    throw new Error(err.detail || resp.statusText);
  }
  const ct = resp.headers.get('Content-Type') || '';
  if (ct.includes('application/json')) return resp.json();
  if (ct.includes('application/octet-stream') || ct.includes('application/json')) {
    const blob = await resp.blob();
    return blob;
  }
  return resp;
}

async function saveBHV() {
  if (!model) { toast(t('noData'), 'error'); return; }
  // Validate cross-references before saving
  const maxIdx = model.States.length - 1;
  let badRefs = [];
  for (let si = 0; si < model.States.length; si++) {
    const st = model.States[si];
    if (!st.Transitions) continue;
    for (const tr of st.Transitions) {
      if (tr.StateIndex < 0 || tr.StateIndex > maxIdx) {
        badRefs.push('S' + si + '→S' + tr.StateIndex);
      }
    }
  }
  if (badRefs.length > 0) {
    toast(t('validateBadRef') + '\n' + badRefs.slice(0, 5).join(', ') + t('validateFixFirst'), 'error');
    return;
  }
  showLoading();
  try {
    const putResp = await api('PUT', '/api/data', model);
    if (putResp.status !== 'ok') throw new Error(putResp.detail || t('saveErr'));
    const resp = await fetch(API + '/api/file/save', { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({detail: resp.statusText}));
      throw new Error(err.detail || resp.statusText);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'output.bhv';
    a.click();
    URL.revokeObjectURL(url);
    toast(t('saveSuccess'), 'success');
  } catch(err) {
    toast(t('saveFail') + err.message, 'error');
  }
  hideLoading();
}

function zoomFit() {
  if (nodes.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const nd of nodes) {
    if (nd.x < minX) minX = nd.x;
    if (nd.y < minY) minY = nd.y;
    if (nd.x + nd.w > maxX) maxX = nd.x + nd.w;
    if (nd.y + nd.h > maxY) maxY = nd.y + nd.h;
  }
  const rect = canvasWrap.getBoundingClientRect();
  const sx = rect.width / (maxX - minX + 100);
  const sy = rect.height / (maxY - minY + 100);
  canvasScale = Math.max(0.2, Math.min(3.0, Math.min(sx, sy)));
  panX = rect.width/2 - (minX + maxX)/2 * canvasScale;
  panY = rect.height/2 - (minY + maxY)/2 * canvasScale;
  document.getElementById('zoomLabel').textContent = Math.round(canvasScale * 100) + '%';
  document.getElementById('panInfo').textContent = `${panX.toFixed(0)},${panY.toFixed(0)}`;
  drawCanvas();
}

const canvas = document.getElementById('state-canvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');

function buildNodes() {
  nodes = [];
  const states = model?.States || [];
  if (states.length === 0) return;

  const filter1 = document.getElementById('filterAnim1').value;
  const filter2 = document.getElementById('filterAnim2').value;
  const f1 = filter1 ? parseInt(filter1) : null;
  const f2 = filter2 ? parseInt(filter2) : null;
  const focusLevel = parseInt(document.getElementById('focusLevel').value) || 0;

  // Determine which states to show based on focus
  let visibleIndices = null; // null = all
  if (focusLevel > 0) {
    // If there are selected nodes, focus on them. Otherwise focus on roots.
    let seeds = [...selectedNodes];
    if (seeds.length === 0) {
      // Roots: states with no incoming transitions
      const inDeg = new Map();
      for (const st of states) {
        for (const tr of (st.Transitions || [])) {
          inDeg.set(tr.StateIndex, (inDeg.get(tr.StateIndex) || 0) + 1);
        }
      }
      for (const st of states) {
        if (!inDeg.has(st.Index)) seeds.push(st.Index);
      }
    }
    // BFS for N hops
    visibleIndices = new Set(seeds);
    let frontier = [...seeds];
    for (let hop = 0; hop < focusLevel; hop++) {
      const next = [];
      for (const idx of frontier) {
        const st = states[idx];
        if (!st?.Transitions) continue;
        for (const tr of st.Transitions) {
          if (!visibleIndices.has(tr.StateIndex)) {
            visibleIndices.add(tr.StateIndex);
            next.push(tr.StateIndex);
          }
        }
      }
      // Also include incoming (reverse) edges for context
      if (hop === 0) {
        for (const st of states) {
          if (!st?.Transitions) continue;
          for (const tr of st.Transitions) {
            if (seeds.includes(tr.StateIndex) && !visibleIndices.has(st.Index)) {
              visibleIndices.add(st.Index);
              next.push(st.Index);
            }
          }
        }
      }
      frontier = next;
    }
  }

  const filtered = states.filter((st, i) => {
    if (visibleIndices && !visibleIndices.has(st.Index)) return false;
    const sb1 = (model.StructBs || [])[st.StructBid];
    const sb2 = (model.StructBs || [])[st.StructBsid2];
    if (f1 !== null && (!sb1 || sb1.Unk00 !== f1)) return false;
    if (f2 !== null && (!sb2 || sb2.Unk00 !== f2)) return false;
    return true;
  });

  const n = filtered.length;
  if (n === 0) { document.getElementById('nodeCount').textContent = '0'; drawCanvas(); return; }
  const minW = n > 100 ? 90 : n > 50 ? 110 : 130;
  const minH = n > 100 ? 50 : n > 50 ? 60 : 70;
  const spacingX = n > 100 ? 160 : n > 50 ? 180 : 200;
  const spacingY = n > 100 ? 120 : n > 50 ? 140 : 160;
  const cols = Math.ceil(Math.sqrt(n));

  filtered.forEach((st, i) => {
    const sb1 = (model.StructBs || [])[st.StructBid];
    const sb2 = (model.StructBs || [])[st.StructBsid2];
    let label = `S${st.Index} A1:${sb1?.Unk00 ?? -1} A2:${sb2?.Unk00 ?? -1}`;
    const dbgName = debugStates[st.Index]?.StateName;
    if (dbgName) label += `\n${dbgName}`;
    if (st.Transitions?.length) label += `\n→${st.Transitions.length}`;

    const col = i % cols, row = Math.floor(i / cols);
    const x = 50 + col * spacingX, y = 50 + row * spacingY;
    nodes.push({ index: st.Index, x, y, w: minW, h: minH, label, state: st, dbgName });
  });
  document.getElementById('nodeCount').textContent = n + (visibleIndices ? ` / ${states.length}` : '');
  updateStatusBar();
  if (is3d) build3DGraph(); else { drawCanvas(); if (visibleIndices && n > 0) setTimeout(zoomFit, 50); }
}

// Focus level change rebuilds
document.getElementById('focusLevel').addEventListener('change', buildNodes);

function screenToWorld(sx, sy) {
  const rect = canvasWrap.getBoundingClientRect();
  return {
    x: (sx - rect.left - panX) / canvasScale,
    y: (sy - rect.top - panY) / canvasScale
  };
}

function findNodeAt(wx, wy) {
  return nodes.find(nd => wx >= nd.x && wx <= nd.x + nd.w && wy >= nd.y && wy <= nd.y + nd.h);
}

function drawCanvas() {
  // Resize canvas
  canvas.width = canvasWrap.clientWidth;
  canvas.height = canvasWrap.clientHeight;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(canvasScale, 0, 0, canvasScale, panX, panY);

  // ── Draw transitions ──
  // Two-pass: first count edges per pair, then draw with proper spacing
  const pairEdgeMap = new Map(); // "min-max" → total count
  for (const nd of nodes) {
    if (!nd.state?.Transitions) continue;
    for (const tr of nd.state.Transitions) {
      const a = Math.min(nd.index, tr.StateIndex);
      const b = Math.max(nd.index, tr.StateIndex);
      const k = a + '-' + b;
      pairEdgeMap.set(k, (pairEdgeMap.get(k) || 0) + 1);
    }
  }
  const drawnPerPair = new Map();
  
  // Edge base width (thicker for visibility)
  const edgeW = 2.2 / canvasScale;
  ctx.lineCap = 'round';
  
  for (const nd of nodes) {
    const st = nd.state;
    if (!st.Transitions) continue;
    for (const tr of st.Transitions) {
      const tgt = nodes.find(n => n.index === tr.StateIndex);
      if (!tgt) continue;
      
      const condCnt = tr.Conditions?.length || 0;
      // Brighter colors for visibility on dark bg
      const color = condCnt > 5 ? '#f38ba8' : condCnt > 0 ? '#74c7ec' : '#9399b2';
      ctx.strokeStyle = color;
      ctx.lineWidth = edgeW;
      
      // ── Self-loop ──
      if (nd.index === tr.StateIndex) {
        const cx = nd.x + nd.w / 2, cy = nd.y + nd.h / 2;
        const loopR = nd.w * 0.5;
        const selfIdx = drawnPerPair.get(`self-${nd.index}`) || 0;
        drawnPerPair.set(`self-${nd.index}`, selfIdx + 1);
        // Stack self-loops vertically
        const arcY = cy - nd.h * 0.1 - selfIdx * 14 / canvasScale;
        ctx.beginPath();
        ctx.ellipse(cx, arcY, loopR * 0.6, loopR * 0.35, 0, Math.PI * 0.15, Math.PI * 0.85);
        ctx.stroke();
        const ax = cx + loopR * 0.6 * Math.cos(Math.PI * 0.85);
        const ay = arcY + loopR * 0.35 * Math.sin(Math.PI * 0.85);
        // Arrow tangent: derivative of ellipse at endAngle
        const au = -loopR * 0.6 * Math.sin(Math.PI * 0.85);
        const av = loopR * 0.35 * Math.cos(Math.PI * 0.85);
        const alen = Math.sqrt(au * au + av * av) || 1;
        drawArrow(ax, ay, au / alen, av / alen);
        continue;
      }
      
      // ── Normal edge ──
      const cx1 = nd.x + nd.w / 2, cy1 = nd.y + nd.h / 2;
      const cx2 = tgt.x + tgt.w / 2, cy2 = tgt.y + tgt.h / 2;
      const dx = cx2 - cx1, dy = cy2 - cy1;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / dist, uy = dy / dist;
      const nx = -uy, ny = ux;  // perpendicular
      
      // Multi-edge offset: each edge gets a different lane
      const a = Math.min(nd.index, tr.StateIndex);
      const b = Math.max(nd.index, tr.StateIndex);
      const pKey = a + '-' + b;
      const totalInPair = pairEdgeMap.get(pKey) || 1;
      const nth = drawnPerPair.get(pKey) || 0;
      drawnPerPair.set(pKey, nth + 1);
      
      // Spread range: -(n-1)/2 ... 0 ... +(n-1)/2, in steps of 1
      const offsetIdx = nth - (totalInPair - 1) / 2;
      const gap = 14 / canvasScale;
      const spread = offsetIdx * gap;
      
      // Curve bend: stronger for nearby nodes
      const bendFrac = Math.max(0.06, Math.min(0.22, 50 / dist));
      const bendDist = dist * bendFrac + Math.abs(spread) * 0.6;
      const mx = (cx1 + cx2) / 2 + nx * bendDist;
      const my = (cy1 + cy2) / 2 + ny * bendDist;
      
      // Endpoints on node edges
      const margin = 4 / canvasScale;
      const sx = cx1 + ux * (nd.w / 2 + margin);
      const sy = cy1 + uy * (nd.h / 2 + margin);
      const ex = cx2 - ux * (tgt.w / 2 + margin);
      const ey = cy2 - uy * (tgt.h / 2 + margin);
      
      // Subtle shadow for depth
      ctx.shadowColor = color + '66';
      ctx.shadowBlur = 3 / canvasScale;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(mx, my, ex, ey);
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      // Arrow
      drawArrow(ex, ey, ux, uy);
      
      // Condition count badge — only when zoomed in
      if (condCnt > 0 && canvasScale >= 0.45) {
        const badgeX = mx + nx * 2 / canvasScale;
        const badgeY = my + ny * 2 / canvasScale;
        const badgeR = Math.min(6 / canvasScale, 10);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1e1e2e';
        ctx.font = `bold ${Math.max(8, 9 / canvasScale)}px "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(condCnt, badgeX, badgeY);
      }
    }
  }

  function drawArrow(x, y, ux, uy) {
    const len = 8 / canvasScale;
    const wid = 4.5 / canvasScale;
    ctx.fillStyle = ctx.strokeStyle;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - ux * len + uy * wid, y - uy * len - ux * wid);
    ctx.lineTo(x - ux * len - uy * wid, y - uy * len + ux * wid);
    ctx.closePath();
    ctx.fill();
  }

  function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Draw nodes (rounded rect with gradient, shadow, Anim1 color coding)
  // Color palette for Anim1 IDs — 10 distinct hues
  const ANIM_COLORS = [
    '#89b4fa', '#a6e3a1', '#f9e2af', '#fab387', '#f38ba8',
    '#cba6f7', '#94e2d5', '#b4befe', '#f5c2e7', '#89dceb'
  ];
  
  // Precompute in-degree for root/leaf detection
  const inDeg = new Map();
  for (const nd of nodes) {
    if (!nd.state?.Transitions) continue;
    for (const tr of nd.state.Transitions) {
      inDeg.set(tr.StateIndex, (inDeg.get(tr.StateIndex) || 0) + 1);
    }
  }
  
  // Helper: gradient fill for a rounded rect
  function fillGradient(x, y, w, h, r, topColor, botColor) {
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, topColor);
    grad.addColorStop(1, botColor);
    ctx.fillStyle = grad;
    roundRect(ctx, x, y, w, h, r);
    ctx.fill();
  }
  
  let nodeIdx = 0;
  for (const nd of nodes) {
    nodeIdx++;
    const hasDbg = !!nd.dbgName;
    const isHighlight = window._highlightIdx === nd.index;
    const isSelected = selectedNodes.has(nd.index);
    const sb1 = (model?.StructBs || [])[nd.state?.StructBid];
    let anim1 = sb1?.Unk00 ?? -1;
    let anim2 = sb1?.Unk04 ?? -1;
    // When StructBid=-1, try LeftHandAnimationId / StructBsid2 for A1/A2
    if (anim1 === -1 && nd.state) {
      const lha = nd.state.LeftHandAnimationId;
      if (lha >= 0) {
        const sbLh = (model?.StructBs || [])[lha];
        anim1 = sbLh?.Unk00 ?? anim1;
        anim2 = sbLh?.Unk04 ?? anim2;
      } else {
        const sbid2 = nd.state.StructBsid2;
        if (sbid2 >= 0) {
          const sb2 = (model?.StructBs || [])[sbid2];
          anim1 = sb2?.Unk00 ?? anim1;
          anim2 = sb2?.Unk04 ?? anim2;
        }
      }
    }
    const colorIdx = ((anim1 % ANIM_COLORS.length) + ANIM_COLORS.length) % ANIM_COLORS.length;
    const baseColor = ANIM_COLORS[colorIdx];
    
    // Darken color for gradient bottom
    const darken = (hex, amt) => {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.max(0, (num >> 16) - amt);
      const g = Math.max(0, ((num >> 8) & 0xFF) - amt);
      const b = Math.max(0, (num & 0xFF) - amt);
      return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
    };
    
    const r = 8 / canvasScale;
    const topColor = isHighlight ? '#f9e2af' : (hasDbg ? '#a6e3a1' : baseColor);
    const botColor = isHighlight ? '#e5c890' : darken(topColor, 30);
    
    // Subtle shadow under every node
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 6 / canvasScale;
    ctx.shadowOffsetY = 2 / canvasScale;
    fillGradient(nd.x, nd.y, nd.w, nd.h, r, topColor, botColor);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    
    // Highlight glow
    if (isHighlight) {
      ctx.shadowColor = '#f9e2af88';
      ctx.shadowBlur = 16 / canvasScale;
      roundRect(ctx, nd.x, nd.y, nd.w, nd.h, r);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // Border
    const isRoot = (inDeg.get(nd.index) || 0) === 0;
    const isLeaf = !nd.state?.Transitions?.length;
    ctx.strokeStyle = isSelected ? '#f38ba8' : isHighlight ? '#e5c890' : 'rgba(205,214,244,0.5)';
    ctx.lineWidth = (isSelected ? 3 : isRoot ? 2.2 : 1.2) / canvasScale;
    roundRect(ctx, nd.x, nd.y, nd.w, nd.h, r);
    ctx.stroke();
    
    // Root dot (entry) — top-left corner
    if (isRoot) {
      ctx.fillStyle = '#a6e3a1';
      ctx.beginPath();
      ctx.arc(nd.x + 5/canvasScale, nd.y + 5/canvasScale, 4/canvasScale, 0, Math.PI*2);
      ctx.fill();
    }
    // Leaf dot (exit) — top-right corner 
    if (isLeaf) {
      ctx.fillStyle = '#f38ba8';
      ctx.beginPath();
      ctx.arc(nd.x + nd.w - 5/canvasScale, nd.y + 5/canvasScale, 4/canvasScale, 0, Math.PI*2);
      ctx.fill();
    }

    // Label (only when zoomed in enough)
    if (canvasScale >= 0.35) {
      // Anim1 chip badge at top
      const chipH = 14 / canvasScale;
      const chipY = nd.y + 6 / canvasScale;
      ctx.fillStyle = 'rgba(30,30,46,0.7)';
      roundRect(ctx, nd.x + 4/canvasScale, chipY, nd.w - 8/canvasScale, chipH, 3/canvasScale);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = `${Math.max(8, 9/canvasScale)}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`A1:${anim1}  A2:${anim2}`, nd.x + nd.w/2, chipY + chipH/2);
      
      // State index — large, centered
      ctx.fillStyle = '#1e1e2e';
      const idxSize = Math.min(14 / canvasScale, 22);
      ctx.font = `bold ${Math.max(10, idxSize)}px "Segoe UI", sans-serif`;
      ctx.fillText(`S${nd.index}`, nd.x + nd.w/2, nd.y + nd.h/2 + chipH/2);
      
      // Bottom info line — transition count + debug name
      if (hasDbg || (nd.state?.Transitions?.length || 0) > 0) {
        const infoY = nd.y + nd.h - 8 / canvasScale;
        ctx.font = `${Math.max(7, 8/canvasScale)}px "Segoe UI", sans-serif`;
        ctx.fillStyle = '#6c7086';
        const parts = [];
        if (nd.state?.Transitions?.length) parts.push(`→${nd.state.Transitions.length}`);
        if (hasDbg) parts.push(nd.dbgName.substring(0, 12));
        ctx.fillText(parts.join(' '), nd.x + nd.w/2, infoY);
      }
    }

    // Hint on first node
    if (nodeIdx === 1 && nodes.length > 0) {
      ctx.fillStyle = '#fab38788';
      ctx.font = `${Math.max(9, 10/canvasScale)}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(t('dragHint'), nd.x + nd.w + 4, nd.y + 10);
    }
  }

  // Box selection
  if (boxRect) {
    ctx.strokeStyle = '#cba6f7';
    ctx.lineWidth = 1.5 / canvasScale;
    ctx.setLineDash([5 / canvasScale, 3 / canvasScale]);
    ctx.strokeRect(boxRect.x, boxRect.y, boxRect.w, boxRect.h);
    ctx.setLineDash([]);
  }

  // Preview line
  if (pendingSource) {
    const src = pendingSource;
    ctx.strokeStyle = '#fab387';
    ctx.lineWidth = 2 / canvasScale;
    ctx.beginPath();
    ctx.moveTo(src.x + src.w/2, src.y + src.h/2);
    ctx.lineTo(worldMouse.x, worldMouse.y);
    ctx.stroke();
  }

  // Draw minimap
  drawMinimap();
}

function drawMinimap() {
  const mm = document.getElementById('minimap');
  if (!mm || nodes.length === 0) { mm.style.display = 'none'; return; }
  mm.style.display = 'block';
  const mw = 180, mh = 120;
  mm.width = mw; mm.height = mh;
  const mctx = mm.getContext('2d');
  mctx.fillStyle = '#181825';
  mctx.fillRect(0, 0, mw, mh);

  // Compute bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const nd of nodes) {
    if (nd.x < minX) minX = nd.x;
    if (nd.y < minY) minY = nd.y;
    if (nd.x + nd.w > maxX) maxX = nd.x + nd.w;
    if (nd.y + nd.h > maxY) maxY = nd.y + nd.h;
  }
  const pad = 20;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX, wh = maxY - minY;
  const sx = mw / ww, sy = mh / wh;
  const scale = Math.min(sx, sy);

  // Draw nodes as dots
  mctx.fillStyle = '#89b4fa88';
  for (const nd of nodes) {
    const cx = (nd.x + nd.w/2 - minX) * scale + (mw - ww * scale) / 2;
    const cy = (nd.y + nd.h/2 - minY) * scale + (mh - wh * scale) / 2;
    mctx.fillRect(cx - 2, cy - 2, 4, 4);
  }

  // Draw viewport rectangle
  const rect = canvasWrap.getBoundingClientRect();
  const vx = -panX / canvasScale, vy = -panY / canvasScale;
  const vw = rect.width / canvasScale, vh = rect.height / canvasScale;
  mctx.strokeStyle = '#f38ba8';
  mctx.lineWidth = 1;
  mctx.strokeRect(
    (vx - minX) * scale + (mw - ww * scale) / 2,
    (vy - minY) * scale + (mh - wh * scale) / 2,
    vw * scale, vh * scale
  );
}

// Minimap click to navigate
document.getElementById('minimap').addEventListener('click', (e) => {
  if (nodes.length === 0) return;
  const mm = e.target;
  const rect = mm.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  // Compute world position
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const nd of nodes) {
    if (nd.x < minX) minX = nd.x;
    if (nd.y < minY) minY = nd.y;
    if (nd.x + nd.w > maxX) maxX = nd.x + nd.w;
    if (nd.y + nd.h > maxY) maxY = nd.y + nd.h;
  }
  const pad = 20;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX, wh = maxY - minY;
  const sx = 180 / ww, sy = 120 / wh;
  const scale = Math.min(sx, sy);
  const wx = (mx - (180 - ww * scale) / 2) / scale + minX;
  const wy = (my - (120 - wh * scale) / 2) / scale + minY;
  const cr = canvasWrap.getBoundingClientRect();
  panX = cr.width/2 - wx * canvasScale;
  panY = cr.height/2 - wy * canvasScale;
  document.getElementById('panInfo').textContent = `${panX.toFixed(0)},${panY.toFixed(0)}`;
  drawCanvas();
});

let worldMouse = { x: 0, y: 0 };

canvasWrap.addEventListener('mousedown', (e) => {
  const w = screenToWorld(e.clientX, e.clientY);
  worldMouse = w;
  if (e.button === 1) {
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    e.preventDefault();
    return;
  }
  if (e.button === 0) {
    // Check quick trigger
    for (const nd of nodes) {
      if (w.x >= nd.x + nd.w - 14 && w.x <= nd.x + nd.w && w.y >= nd.y && w.y <= nd.y + 14) {
        pendingSource = nd;
        return;
      }
    }
    const hit = findNodeAt(w.x, w.y);
    if (hit) {
      if (!e.shiftKey) { selectedNodes.clear(); }
      selectedNodes.add(hit.index);
      draggingNode = hit;
      dragOffX = w.x - hit.x;
      dragOffY = w.y - hit.y;
      return;
    }
    selectedNodes.clear();
    pendingSource = null;
    boxSelecting = true;
    boxStart = { x: w.x, y: w.y };
    boxRect = null;
  }
});

canvasWrap.addEventListener('mousemove', (e) => {
  worldMouse = screenToWorld(e.clientX, e.clientY);
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    document.getElementById('panInfo').textContent = `${panX.toFixed(0)},${panY.toFixed(0)}`;
    drawCanvas();
    return;
  }
  if (draggingNode) {
    draggingNode.x = worldMouse.x - dragOffX;
    draggingNode.y = worldMouse.y - dragOffY;
    drawCanvas();
    return;
  }
  if (boxSelecting) {
    const x = Math.min(boxStart.x, worldMouse.x);
    const y = Math.min(boxStart.y, worldMouse.y);
    const w = Math.abs(worldMouse.x - boxStart.x);
    const h = Math.abs(worldMouse.y - boxStart.y);
    boxRect = { x, y, w, h };
    drawCanvas();
    return;
  }
  if (pendingSource) {
    canvasWrap.style.cursor = 'crosshair';
    drawCanvas();
    return;
  }
  const hit = findNodeAt(worldMouse.x, worldMouse.y);
  canvasWrap.style.cursor = hit ? 'pointer' : '';
});

canvasWrap.addEventListener('mouseup', (e) => {
  const w = screenToWorld(e.clientX, e.clientY);
  if (isPanning) { isPanning = false; return; }
  if (draggingNode) {
    // Update state position
    draggingNode = null;
    syncNodePositions();
    drawCanvas();
    return;
  }
  if (pendingSource) {
    const dst = findNodeAt(w.x, w.y);
    if (dst && dst !== pendingSource) {
      addTransition(pendingSource, dst);
    }
    pendingSource = null;
    canvasWrap.style.cursor = '';
    drawCanvas();
    return;
  }
  if (boxSelecting && boxRect) {
    boxSelecting = false;
    for (const nd of nodes) {
      if (nd.x >= boxRect.x && nd.x + nd.w <= boxRect.x + boxRect.w &&
          nd.y >= boxRect.y && nd.y + nd.h <= boxRect.y + boxRect.h) {
        selectedNodes.add(nd.index);
      }
    }
    boxRect = null;
    drawCanvas();
    return;
  }
  boxSelecting = false;
});

canvasWrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  canvasScale *= zoomFactor;
  canvasScale = Math.max(0.2, Math.min(3.0, canvasScale));
  document.getElementById('zoomLabel').textContent = Math.round(canvasScale * 100) + '%';
  drawCanvas();
});

canvasWrap.addEventListener('dblclick', (e) => {
  const w = screenToWorld(e.clientX, e.clientY);
  const hit = findNodeAt(w.x, w.y);
  if (hit) {
    selectedNodes.clear();
    selectedNodes.add(hit.index);
    document.getElementById('focusLevel').value = '2';
    buildNodes();
    jumpToState(hit.index);
  }
});

canvasWrap.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const w = screenToWorld(e.clientX, e.clientY);
  const hit = findNodeAt(w.x, w.y);
  showContextMenu(e.clientX, e.clientY, hit);
});

function addTransition(src, dst) {
  if (!model) return;
  const st = model.States[src.index];
  if (!st.Transitions) st.Transitions = [];
  const newTr = {
    StateIndex: dst.index,
    Unk10: 0, Unk14: 0, Unk18: 0, Unk1C: 0,
    Conditions: [],
    StructAbb: { Unk00: 0, Unk01: 1, Unk02: 0, Unk03: 0, Type: 0,
      BehaviorMatrixParam_f: 0, BehaviorMatrixParam_i: 0,
      Unk08_int: 0, Unk08_f: 0, Unk0C: 0, Unk10_int: 0,
      Unk14_int: 0, Unk18_int: 0, Unk1C_int: 0, Unk04: 0, Unk20_int: 0 }
  };
  st.Transitions.push(newTr);
  pushHistory();
  buildNodes();
}

function renderIntsHTML(hex, condId, ti, ci) {
  const hexStr = (hex || '').replace(/\s+/g, '');
  const sig = SIGS[String(condId)] || '';
  // Parse signature into flat type list
  const types = [];
  if (sig) {
    const parts = sig.split(',');
    for (const p of parts) {
      const m = p.match(/^([ifh])(\d+)$/);
      if (m) { for (let j = 0; j < parseInt(m[2]); j++) types.push(m[1]); }
    }
  }
  // Build values from hex data using signature types
  const vals = [];
  if (hexStr.length >= 2) {
    let pos = 0;
    for (let vi = 0; vi < types.length || pos < hexStr.length; vi++) {
      const t = types[vi] || 'i';
      if (t === 'h') {
        // Half-word (int16): read 2 bytes
        if (pos + 3 >= hexStr.length) break;
        const lo = parseInt(hexStr.substr(pos, 2), 16) || 0;
        const hi = parseInt(hexStr.substr(pos + 2, 2), 16) || 0;
        const raw16 = lo | (hi << 8);
        const v16 = raw16 > 0x7FFF ? raw16 - 0x10000 : raw16;
        vals.push({ v: v16, t: 'h', raw: raw16 });
        pos += 4;
      } else {
        // Full word (int32 or float32): read 4 bytes
        if (pos + 7 >= hexStr.length) break;
        const b0 = parseInt(hexStr.substr(pos, 2), 16) || 0;
        const b1 = parseInt(hexStr.substr(pos + 2, 2), 16) || 0;
        const b2 = parseInt(hexStr.substr(pos + 4, 2), 16) || 0;
        const b3 = parseInt(hexStr.substr(pos + 6, 2), 16) || 0;
        const raw = b0 | (b1 << 8) | (b2 << 16) | (b3 << 24);
        if (t === 'f') {
          const buf = new ArrayBuffer(4);
          const dv = new DataView(buf);
          dv.setUint8(0, b0); dv.setUint8(1, b1); dv.setUint8(2, b2); dv.setUint8(3, b3);
          vals.push({ v: parseFloat(dv.getFloat32(0, true).toFixed(4)), t: 'f', raw });
        } else {
          vals.push({ v: raw > 0x7FFFFFFF ? raw - 0x100000000 : raw, t: 'i', raw });
        }
        pos += 8;
      }
    }
  } else if (types.length > 0) {
    for (let i = 0; i < types.length; i++) {
      vals.push({ v: 0, t: types[i], raw: 0 });
    }
  } else {
    vals.push({ v: 0, t: 'i', raw: 0 });
  }
  let h = '';
  vals.forEach((sv, i) => {
    const color = sv.t === 'f' ? 'var(--orange)' : sv.t === 'h' ? 'var(--green)' : 'var(--accent2)';
    const w = sv.t === 'f' ? 70 : sv.t === 'h' ? 50 : 60;
    h += `<input type="text" value="${sv.v}" data-tr="${ti}" data-cond="${ci}" data-intidx="${i}" data-inttype="${sv.t}" style="width:${w}px;padding:2px 4px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:${color};font-size:10px;font-family:var(--mono);text-align:right">`;
  });
  return h;
}

// Render semantic description of a condition based on its Id and DataHex
function describeCondition(cid, hex) {
  const str = (hex || '').replace(/\s+/g, '');
  if (str.length < 2) return '';
  const bytes = [];
  for (let i = 0; i < str.length; i += 2) {
    bytes.push(parseInt(str.substr(i, 2), 16) || 0);
  }
  const u32 = (off) => (bytes[off]|0) + ((bytes[off+1]|0)<<8) + ((bytes[off+2]|0)<<16) + ((bytes[off+3]|0)<<24);
  const i32 = (off) => { const v = u32(off); return v > 0x7FFFFFFF ? v - 0x100000000 : v; };
  const f32 = (off) => { const buf = new ArrayBuffer(4); const dv = new DataView(buf);
    dv.setUint8(0,bytes[off]||0); dv.setUint8(1,bytes[off+1]||0); dv.setUint8(2,bytes[off+2]||0); dv.setUint8(3,bytes[off+3]||0);
    return parseFloat(dv.getFloat32(0,true).toFixed(4)); };
  const u16 = (off) => ((bytes[off]|0) + ((bytes[off+1]|0)<<8));

  const typeName = COND_INFO[String(cid)] || `Id=${cid}`;
  const hexDump = bytes.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');

  try {
    // Id=1: 入力検出 (24 bytes)
    if (cid === 1 && bytes.length >= 4) {
      const op = i32(0);
      const label = OPCODE_LABELS[String(op)] || `Unk${op}`;
      const f1 = bytes.length >= 12 ? f32(8) : 0;
      const f2 = bytes.length >= 16 ? f32(12) : 0;
      const fl = bytes.length >= 20 ? i32(16) : 0;
      return `<b>输入检测</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">OpCode=${op}</span> <b>${label}</b>` +
        (f1 !== 0 || f2 !== 0 ? ` | float=(${f1}, ${f2})` : '') +
        (fl !== 0 ? ` | flags=${fl}` : '');
    }
    // Id=3: 动画结束 (8 bytes)
    if (cid === 3 && bytes.length >= 4) {
      const t = i32(0);
      const labels = {2:'攻击动画完成', 0:'待机', 1:'循环'};
      return `<b>动画结束</b> [${hexDump}]<br>` +
        `type=<span style="color:var(--orange)">${t}</span> ${labels[String(t)] || ''}`;
    }
    // Id=11: 子行为调用 (20 bytes)
    if (cid === 11 && bytes.length >= 4) {
      return `<b>子行为调用</b> [${hexDump}]<br>param=${i32(0)}`;
    }
    // Id=17: 能量检查 (8 bytes)
    if (cid === 17) {
      return `<b>能量检查</b> [${hexDump}]<br>` +
        (i32(0) === 0 ? 'EN <span style="color:var(--orange)">空</span>' : `EN not empty (val=${i32(0)})`);
    }
    // Id=19: 速度/状态 (16 bytes)
    if (cid === 19 && bytes.length >= 4) {
      return `<b>速度/落下/着地</b> [${hexDump}]<br>` +
        `type=${i32(0)}${bytes.length >= 12 ? ` | float=(${f32(8)}, ${f32(12)})` : ''}`;
    }
    // Id=22: 取消标志 (4 bytes)
    if (cid === 22) {
      const v = i32(0);
      return `<b>取消标志</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">${v === 0 ? '取消允许' : '取消禁止(flag='+v+')'}</span>`;
    }
    // Id=24: 无条件
    if (cid === 24) {
      return '<b>无条件</b> — 始终成立';
    }
    // Id=25: 能量空
    if (cid === 25) {
      return `<b>能量空</b> [${hexDump}]`;
    }
    // Id=27: 等待时间 (8 bytes)
    if (cid === 27 && bytes.length >= 4) {
      const sec = f32(0);
      return `<b>等待时间</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">${sec.toFixed(2)}秒</span> 经过`;
    }
    // Id=28: 模式 (8 bytes)
    if (cid === 28 && bytes.length >= 4) {
      const mode = i32(0);
      return `<b>模式/状况</b> [${hexDump}]<br>` +
        `mode=<span style="color:var(--orange)">${mode}</span>`;
    }
    // Id=29: Float条件 (16 bytes)
    if (cid === 29 && bytes.length >= 8) {
      return `<b>Float条件</b> [${hexDump}]<br>` +
        `val1=<span style="color:var(--orange)">${i32(0)}</span>` +
        (bytes.length >= 16 ? ` | f1=${f32(8)}, f2=${f32(12)}` : '');
    }
    // Id=30: 弹药/插槽 (4 bytes)
    if (cid === 30) {
      const slot = i32(0);
      return `<b>弹药/插槽</b> [${hexDump}]<br>` +
        `slot=<span style="color:var(--orange)">${slot}</span>` +
        (slot === 10 ? ' (武器切换用)' : slot === 46 ? ' (特殊)' : slot === 57 ? ' (备用)' : '');
    }
    // Id=31: 副武器 (4 bytes)
    if (cid === 31) {
      return `<b>副武器</b> [${hexDump}]<br>val=${i32(0)}`;
    }
    // Id=33: 方向/角度 (8 bytes)
    if (cid === 33 && bytes.length >= 4) {
      return `<b>方向/角度</b> [${hexDump}]<br>` +
        `angle=<span style="color:var(--orange)">${i32(0)}°</span>~${bytes.length >= 8 ? i32(4)+'°' : ''}`;
    }
    // Id=39: 动作上下文 (16 bytes)
    if (cid === 39 && bytes.length >= 4) {
      return `<b>动作上下文</b> [${hexDump}]<br>` +
        `type=<span style="color:var(--orange)">${i32(0)}</span>` +
        (bytes.length >= 12 ? ` | sub=${i32(4)}, float=${f32(8)}` : '');
    }
    // Id=40: 目标锁定 (4 bytes)
    if (cid === 40) {
      const v = i32(0);
      const label = v === 1 ? '硬锁 (Hard Lock)' : v === 0 ? '新锁定 (New Lock)' : `Lock=${v}`;
      return `<b>目标锁定</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">${label}</span>`;
    }
    // Id=41: 攻击上下文 (20 bytes)
    if (cid === 41 && bytes.length >= 8) {
      const v1 = i32(0), v2 = i32(4);
      const ctxLabels = {
        '8,0':'防御关闭', '8,1':'防御中',
        '10,0':'武器切换上下文',
        '21,0':'武器架起中', '23,3':'武器形式3',
        '25,0':'攻击连击中', '26,0':'派生行动',
        '31,0':'无武器',
      };
      const label = ctxLabels[`${v1},${v2}`] || `ctx=(${v1},${v2})`;
      const extra = bytes.length >= 12 ? ` | pad=${bytes.slice(8,12).map(b=>b.toString(16)).join('')}` : '';
      return `<b>攻击上下文</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">${label}</span>${extra}`;
    }
    // Id=42: 本体动作类型 (16 bytes)
    if (cid === 42 && bytes.length >= 4) {
      const t = i32(0);
      const actionLabels = {
        0:'待机', 1:'移动', 2:'奔跑', 3:'推进', 4:'跳跃',
        5:'落下', 6:'推进上升', 7:'快速转身',
      };
      return `<b>本体动作类型</b> [${hexDump}]<br>` +
        `type=<span style="color:var(--orange)">${t}</span> ${actionLabels[String(t)] || ''}` +
        (bytes.length >= 12 ? ` | float=(${f32(8)}, ${f32(12)})` : '');
    }
    // Id=43: 特殊效果 (12 bytes)
    if (cid === 43 && bytes.length >= 8) {
      const flag = i32(0), speff = i32(4);
      const state = bytes.length >= 12 ? i32(8) : 0;
      const sname = SPEFFECT_NAMES[String(speff)] || '';
      return `<b>特殊效果 (SpEffect)</b> [${hexDump}]<br>` +
        `ID=<span style="color:var(--orange)">0x${speff.toString(16).toUpperCase()}</span>` +
        (sname ? ` <b>${sname}</b>` : '') +
        (flag ? ` | flag=${flag}` : '') +
        (state ? ` | state=${state}` : '');
    }
    // Id=44: 武器类别 (4 bytes)
    if (cid === 44) {
      const v = i32(0);
      const cat = {1:'主武器', 2:'副武器', 3:'特殊武器', 4:'副2', 6:'主2'}[v] || `cat=${v}`;
      return `<b>武器类别</b> [${hexDump}]<br>` +
        `<span style="color:var(--orange)">${cat}</span>`;
    }
    // Id=48: 行动类型 (28 bytes)
    if (cid === 48 && bytes.length >= 28) {
      const at = i32(24);
      const label = ACTIONTYPE_LABELS[String(at)] || `${at}`;
      const header = bytes.slice(0, 4).map(b=>b.toString(16).padStart(2,'0')).join(' ');
      return `<b>行动类型分派</b> [${hexDump}]<br>` +
        `act=<span style="color:var(--orange)">${at}</span> <b>${label}</b>` +
        (header !== '06 00 00 00' ? ` | header=${header}` : '');
    }
    // Id=57: 状态标志 (8 bytes)
    if (cid === 57 && bytes.length >= 4) {
      const flag = u16(2);
      return `<b>状态标志</b> [${hexDump}]<br>` +
        `flag=<span style="color:var(--orange)">0x${flag.toString(16).toUpperCase()}</span>`;
    }
    // Id=68: 特殊派生 (4 bytes)
    if (cid === 68) {
      const v = i32(0);
      return `<b>特殊派生</b> [${hexDump}]<br>` +
        (v === 1 ? '<span style="color:var(--orange)">派生触发 ON</span>' : `val=${v}`);
    }
    // Id=73: 稀有条件 (8 bytes)
    if (cid === 73 && bytes.length >= 4) {
      return `<b>稀有条件</b> [${hexDump}]<br>f=${f32(0)}, i=${i32(4)}`;
    }
    // Id=74: 武器索引 (4 bytes)
    if (cid === 74) {
      const idx = i32(0);
      return `<b>武器索引</b> [${hexDump}]<br>` +
        `idx=<span style="color:var(--orange)">${idx}</span>`;
    }
    // Id=86: 输入方向 (4 bytes)
    if (cid === 86) {
      return `<b>输入方向</b> [${hexDump}]<br>dir=${i32(0)}`;
    }
    // Id=87: 武器开关 (4 bytes)
    if (cid === 87) {
      return `<b>武器开关</b> [${hexDump}]<br>val=${i32(0)}`;
    }
    // Id=91: 开关状态 (4 bytes)
    if (cid === 91) {
      return `<b>开关状态</b> [${hexDump}]<br>state=${i32(0)}`;
    }
  } catch(e) {}
  // Fallback: show raw hex
  return `<b>${typeName}</b> [${hexDump}]`;
}

function syncIntsToHex(overlay, ti, ci, st) {
  const row = overlay.querySelector(`[data-byte-row="${ti}-${ci}"]`);
  if (!row) return;
  const hexBytes = [];
  const inputs = [...row.querySelectorAll('input[data-intidx]')];
  for (let i = 0; i < inputs.length; i++) {
    const ii = inputs[i];
    let val = parseFloat(ii.value) || 0;
    const intType = ii.dataset.inttype || 'i';
    if (intType === 'f') {
      const buf = new ArrayBuffer(4);
      const dv = new DataView(buf);
      dv.setFloat32(0, val, true);
      for (let b = 0; b < 4; b++) hexBytes.push(dv.getUint8(b).toString(16).padStart(2, '0').toUpperCase());
    } else if (intType === 'h') {
      // Half-word: pack two h-values into one 4-byte slot
      let v = Math.trunc(val);
      if (v < 0) v = v + 0x10000;
      hexBytes.push((v & 0xFF).toString(16).padStart(2, '0').toUpperCase());
      hexBytes.push(((v >> 8) & 0xFF).toString(16).padStart(2, '0').toUpperCase());
      // Check if next is also h — if so, pack it into upper 2 bytes
      const next = inputs[i + 1];
      if (next && next.dataset.inttype === 'h') {
        i++; // skip next since we're packing it
        let v2 = Math.trunc(parseFloat(next.value) || 0);
        if (v2 < 0) v2 = v2 + 0x10000;
        hexBytes.push((v2 & 0xFF).toString(16).padStart(2, '0').toUpperCase());
        hexBytes.push(((v2 >> 8) & 0xFF).toString(16).padStart(2, '0').toUpperCase());
      } else {
        // Pad upper 2 bytes with zeros
        hexBytes.push('00', '00');
      }
    } else {
      // int32
      let v = Math.trunc(val);
      if (v < 0) v = v + 0x100000000;
      hexBytes.push((v & 0xFF).toString(16).padStart(2, '0').toUpperCase(),
        ((v >> 8) & 0xFF).toString(16).padStart(2, '0').toUpperCase(),
        ((v >> 16) & 0xFF).toString(16).padStart(2, '0').toUpperCase(),
        ((v >> 24) & 0xFF).toString(16).padStart(2, '0').toUpperCase());
    }
  }
  st.Transitions[ti].Conditions[ci].DataHex = hexBytes.join(' ');
  const hexInp = overlay.querySelector(`input[data-tr="${ti}"][data-cond="${ci}"][data-key="DataHex"]`);
  if (hexInp) hexInp.value = hexBytes.join(' ');
}

function updateIntsDisplay(overlay, ti, ci) {
  const row = overlay.querySelector(`[data-byte-row="${ti}-${ci}"]`);
  if (!row) return;
  const hexInp = overlay.querySelector(`input[data-tr="${ti}"][data-cond="${ci}"][data-key="DataHex"]`);
  const condId = overlay.querySelector(`input[data-tr="${ti}"][data-cond="${ci}"][data-key="Id"]`);
  const hex = hexInp ? hexInp.value : '';
  const cid = condId ? parseInt(condId.value) || 0 : 0;
  row.innerHTML = `<b style="color:var(--accent);font-size:10px;width:18px"></b>
<span style="font-size:9px;color:var(--text2);white-space:nowrap">Ints:</span>
${renderIntsHTML(hex, cid, ti, ci)}`;
  // Rebind int32 change events
  row.querySelectorAll('input[data-intidx]').forEach(inp => {
    const st = row.closest('.modal-overlay').__st;
    inp.addEventListener('input', () => syncIntsToHex(row.closest('.modal-overlay'), ti, ci, st));
  });
}

function bindConditionRowEvents(ti, ci, newRow) {
  // Delete button
  const delBtn = newRow.querySelector('[data-del-cond]');
  if (delBtn) {
    delBtn.onclick = (e) => {
      e.preventDefault();
      st.Transitions[ti].Conditions.splice(ci, 1);
      const details = delBtn.closest('details');
      if (details) {
        const summary = details.querySelector('summary');
        summary.textContent = `Conditions (${st.Transitions[ti].Conditions.length})`;
      }
      // Remove the condition row, hex row, and ints row
      let el = delBtn.closest('div[style*="margin-bottom:3px"]');
      if (el) {
        const hexRow = el.nextElementSibling;
        const intsRow = hexRow?.nextElementSibling;
        el.remove();
        if (hexRow?.querySelector('[data-key="DataHex"]')) hexRow.remove();
        if (intsRow?.querySelector('[data-byte-row]')) intsRow.remove();
      }
    };
  }
  // Add int button
  const addIntBtn = newRow.querySelector('[data-add-int]');
  if (addIntBtn) {
    addIntBtn.onclick = (e) => {
      e.stopPropagation();
      const cond = st.Transitions[ti].Conditions[ci];
      const old = cond.DataHex || '';
      cond.DataHex = old + (old ? ' ' : '') + '00 00 00 00';
      const hexInp = overlay.querySelector(`input[data-tr="${ti}"][data-cond="${ci}"][data-key="DataHex"]`);
      if (hexInp) hexInp.value = cond.DataHex;
      updateIntsDisplay(overlay, ti, ci);
    };
  }
}

function showContextMenu(mx, my, nd) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';
  menu.style.display = 'block';
  menu.style.left = mx + 'px';
  menu.style.top = my + 'px';

  const add = (text, fn, disabled=false) => {
    const div = document.createElement('div');
    div.className = 'ctx-item' + (disabled ? ' ctx-disabled' : '');
    div.textContent = text;
    if (!disabled) div.onclick = () => { fn(); closeContextMenu(); };
    menu.appendChild(div);
  };
  const sep = () => {
    const div = document.createElement('div');
    div.className = 'ctx-sep';
    menu.appendChild(div);
  };

  if (selectedNodes.size > 1) {
    add(t('dupNodes') + ' (' + selectedNodes.size + ')', duplicateSelected);
    sep();
  }

  if (nd) {
    add(t('dupNode'), () => duplicateNode(nd));
    add(t('delState'), () => deleteNode(nd));
    sep();
    // Copy/paste properties
    add(t('copyProps'), () => {
      const {Transitions, DataHex, Offset04, TransitionsOffset, TransitionCount, Index, ...props} = nd.state;
      clipboardProps = JSON.parse(JSON.stringify(props));
      toast(t('copied') + 'S' + nd.index + ' 属性');
    });
    if (clipboardProps) {
      add(t('pasteProps') + (selectedNodes.size > 0 ? ' (' + selectedNodes.size + '个)' : ''), () => {
        const targets = selectedNodes.size > 0 ? [...selectedNodes].map(i => model.States[i]) : [nd.state];
        for (const tgt of targets) {
          Object.assign(tgt, JSON.parse(JSON.stringify(clipboardProps)));
        }
        pushHistory();
        buildNodes();
        toast(t('pastePropsDone') + ' ' + targets.length + ' 个状态', 'success');
      });
    }
    sep();
    const trCount = nd.state.Transitions?.length || 0;
    if (trCount > 0) {
      add(t('copyTrans') + trCount + t('copiedToClipboard'), () => {
        clipboardTransitions = JSON.parse(JSON.stringify(nd.state.Transitions));
        toast(t('copied') + trCount + t('copiedToClipboard'));
      });
    } else {
      add(t('copyTransEmpty'), null, true);
    }
    if (clipboardTransitions.length > 0) {
      add(t('pasteTrans') + clipboardTransitions.length + t('copiedToClipboard'), () => {
        if (!nd.state.Transitions) nd.state.Transitions = [];
        nd.state.Transitions.push(...JSON.parse(JSON.stringify(clipboardTransitions)));
        buildNodes();
      });
    } else {
      add(t('pasteTransEmpty'), null, true);
    }
    sep();
    add(t('editProps'), () => openStateDetail(nd));
  }

  add(t('editMystery'), () => {
    // Switch to State Action tab
    document.querySelectorAll('#tab-bar .tab').forEach(t => t.classList.remove('active'));
    const saTab = document.querySelector('#tab-bar [data-panel="stateaction-panel"]');
    if (saTab) saTab.classList.add('active');
    document.querySelectorAll('#panels .panel').forEach(p => p.classList.remove('active'));
    document.getElementById('stateaction-panel').classList.add('active');
    buildStateActionTable();
  });
  sep();
  add(t('syncDebug'), syncDebug);

  // Close when clicking outside
  setTimeout(() => {
    document.addEventListener('click', closeContextMenu, { once: true });
  }, 50);
}

function copySelectedTransitions(overlay) {

  const checks = overlay.querySelectorAll('.tr-check:checked');
  if (checks.length === 0) return;
  const st = overlay.__st;
  clipboardTransitions = [];
  checks.forEach(cb => {

// ======================================================================
//  NODE OPERATIONS
// ======================================================================
function duplicateNode(nd) {
  if (!model) return;
  const clone = JSON.parse(JSON.stringify(nd.state));
  clone.Index = model.States.length;
  model.States.push(clone);
  pushHistory();
  buildNodes();
}

function duplicateSelected() {
  if (!model) return;
  const clones = [];
  for (const idx of selectedNodes) {
    clones.push(JSON.parse(JSON.stringify(model.States[idx])));
  }
  for (const c of clones) {
    c.Index = model.States.length;
    model.States.push(c);
  }
  pushHistory();
  selectedNodes.clear();
  buildNodes();
}

function deleteNode(nd) {
  if (!model) return;
  const label = debugStates[nd.index]?.StateName || ('S' + nd.index);
  confirm(t('confirmDelete') + ' ' + label + ' ' + t('confirmDeleteMsg'), () => {
    const delIdx = nd.index;
    model.States.splice(delIdx, 1);
    model.States.forEach((s, i) => s.Index = i);
    // Fix cross-references
    for (const st of model.States) {
      if (!st.Transitions) continue;
      st.Transitions = st.Transitions.filter(tr => tr.StateIndex !== delIdx);
      for (const tr of st.Transitions) {
        if (tr.StateIndex > delIdx) tr.StateIndex -= 1;
      }
    }
    pushHistory();
    buildNodes();
  });
}

  buildTransitions();

  // Apply button
  overlay.querySelector('#btnApplyAll').onclick = () => {
    // Apply properties
    // Handle p16 packed fields first
    const doneP16 = new Set();
    overlay.querySelectorAll('#propsArea input[data-p16part]').forEach(inp => {
      const f = inp.dataset.field;
      if (doneP16.has(f)) return;
      const hiInp = overlay.querySelector(`#propsArea input[data-field="${f}"][data-p16part="hi"]`);
      const loInp = overlay.querySelector(`#propsArea input[data-field="${f}"][data-p16part="lo"]`);
      if (!hiInp || !loInp) return;
      let hi = parseInt(hiInp.value) || 0;
      let lo = parseInt(loInp.value) || 0;
      if (hi < 0) hi = hi + 0x10000;
      if (lo < 0) lo = lo + 0x10000;
      const u32 = (lo & 0xFFFF) | ((hi & 0xFFFF) << 16);
      st[f] = u32 > 0x7FFFFFFF ? u32 - 0x100000000 : u32;
      doneP16.add(f);
    });
    // Apply bits4 fields (checkboxes → rebuild u32)
    const bitsDone = new Set();
    overlay.querySelectorAll('#propsArea input[data-bit]').forEach(cb => {
      const f = cb.dataset.field;
      if (bitsDone.has(f)) return;
      bitsDone.add(f);
      let u32 = 0;
      overlay.querySelectorAll('#propsArea input[data-field="' + f + '"][data-bit]').forEach(bc => {
        if (bc.checked) u32 |= (0xFF << (parseInt(bc.dataset.bit) * 8));
      });
      st[f] = u32 > 0x7FFFFFFF ? u32 - 0x100000000 : u32;
    });
    // Apply u8x4 fields (4 byte inputs → rebuild u32)
    const bytesDone = new Set();
    overlay.querySelectorAll('#propsArea input[data-byte]').forEach(inp => {
      const f = inp.dataset.field;
      if (bytesDone.has(f)) return;
      bytesDone.add(f);
      let u32 = 0;
      overlay.querySelectorAll('#propsArea input[data-field="' + f + '"][data-byte]').forEach(bi => {
        const bv = Math.max(0, Math.min(255, parseInt(bi.value) || 0));
        u32 |= (bv << (parseInt(bi.dataset.byte) * 8));
      });
      st[f] = u32 > 0x7FFFFFFF ? u32 - 0x100000000 : u32;
    });
    // Apply regular properties (skip p16/bits4/u8x4 fields)
    overlay.querySelectorAll('#propsArea input[data-field]:not([data-p16part]):not([data-bit]):not([data-byte])').forEach(inp => {
      const f = inp.dataset.field;
      const v = inp.value === '—' ? 'NaN' : inp.value;
      const ft = fieldTypes[f] || 'i32';
      if (ft === 'f32') {
        st[f] = v === 'NaN' ? 'NaN' : (parseFloat(v) || 0);
      } else if (ft === 'u8') {
        st[f] = Math.max(0, Math.min(255, parseInt(v) || 0));
      } else if (ft === 'i8') {
        st[f] = Math.max(-128, Math.min(127, parseInt(v) || 0));
      } else if (ft === 'u16') {
        st[f] = Math.max(0, Math.min(65535, parseInt(v) || 0));
      } else if (ft === 'i16') {
        st[f] = Math.max(-32768, Math.min(32767, parseInt(v) || 0));
      } else if (ft === 'hex4') {
        st[f] = parseInt(v) || 0;  // raw int32
      } else {
        st[f] = parseInt(v) || 0;
      }
    });
    // Apply state Data bytes
    const byteInputs = overlay.querySelectorAll('#propsArea input[data-state-byte]');
    if (byteInputs.length > 0) {
      const bytes = [];
      byteInputs.forEach(bi => {
        const v = bi.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 2).padStart(2, '0').toUpperCase();
        bi.value = v;
        bytes.push(v || '00');
      });
      st.DataHex = bytes.join(' ');
    }
    // Apply state Data hex
    const hexInp = overlay.querySelector('#stateDataHex');
    if (hexInp) {
      st.DataHex = hexInp.value;
    }
    // Apply transition select changes
    overlay.querySelectorAll('select[data-tr]').forEach(sel => {
      const ti = parseInt(sel.dataset.tr);
      st.Transitions[ti].StateIndex = parseInt(sel.value) || 0;
    });
    // Apply transition input changes
    overlay.querySelectorAll('input[data-tr][data-key]').forEach(inp => {
      const ti = parseInt(inp.dataset.tr);
      const key = inp.dataset.key;
      st.Transitions[ti][key] = parseInt(inp.value) || 0;
    });
    // Apply condition inputs
    overlay.querySelectorAll('input[data-tr][data-cond][data-key]').forEach(inp => {
      const ti = parseInt(inp.dataset.tr);
      const ci = parseInt(inp.dataset.cond);
      const key = inp.dataset.key;
      const val = inp.value;
      if (key === 'Expression' || key === 'DataHex') {
        st.Transitions[ti].Conditions[ci][key] = val;
      } else {
        st.Transitions[ti].Conditions[ci][key] = parseInt(val) || 0;
      }
    });
    // Apply StructABB inputs
    overlay.querySelectorAll('input[data-tr][data-abb]').forEach(inp => {
      const ti = parseInt(inp.dataset.tr);
      const ak = inp.dataset.abb;
      const val = inp.value;
      const isFloat = ak.includes('float');
      st.Transitions[ti].StructAbb[ak] = isFloat ? (parseFloat(val) || 0) : (parseInt(val) || 0);
    });
    overlay.remove();
    pushHistory();
    buildNodes();
    toast(t('saved') + st.Index, 'success');
  };
}

function showMysteryModal() {
  if (!model) return;
  document.getElementById('mysteryModalTitle').textContent = t('editMystery');
  const hex = model.Header?.MysteryBlockHex || '';
  const bytes = hexToBytes(hex);
  const shorts = [];
  for (let i = 0; i < bytes.length; i += 2) {
    const val = (bytes[i] | (bytes[i + 1] << 8));
    shorts.push(val > 0x7FFF ? val - 0x10000 : val);
  }
  document.getElementById('mysteryText').value = shorts.join(', ');
  document.getElementById('mysteryModal').style.display = 'flex';
}

function closeMysteryModal() {
  document.getElementById('mysteryModal').style.display = 'none';
}

function applyMystery() {
  if (!model) return;
  const parts = document.getElementById('mysteryText').value.split(/[,;\s]+/).filter(Boolean);
  const newBytes = [];
  for (const p of parts) {
    const v = parseInt(p);
    if (isNaN(v)) { toast(`"${p}" 不是有效的 short`, 'error'); return; }
    const sv = v & 0xFFFF;
    newBytes.push(sv & 0xFF, (sv >> 8) & 0xFF);
  }
  const hex = newBytes.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
  model.Header.MysteryBlockHex = hex;
  toast(t('mysteryUpdated'), 'success');
  closeMysteryModal();
}

function buildStateActionTable() {
  const wrap = document.getElementById('stateaction-table-wrap');
  if (!model || !model.Header) { wrap.innerHTML = ''; return; }
  const hex = model.Header.MysteryBlockHex || '';
  const bytes = hexToBytes(hex);
  if (bytes.length === 0) { wrap.innerHTML = '<div style="padding:12px;color:var(--text2)">(empty)</div>'; return; }
  
  const shorts = [];
  for (let i = 0; i + 1 < bytes.length; i += 2) {
    shorts.push(bytes[i] | (bytes[i+1] << 8));
  }
  
  document.getElementById('saCount').textContent = shorts.length + ' shorts';
  
  let h = '<table class="data-grid"><thead><tr><th>#</th><th>Hex</th><th>i16</th><th>含义 / 状态名</th></tr></thead><tbody>';
  const isBN = model.file_type === 'BASENORMAL' || (bytes.length >= 0xE0);
  shorts.forEach((v, i) => {
    const sv = v > 0x7FFF ? v - 0x10000 : v;
    const label = isBN ? (SA_LABELS_BN[i] || SA_LABELS[i] || '') : (SA_LABELS_W[i] || SA_LABELS[i] || '');
    // If value is a valid state index, show the debug name
    let stateName = '';
    if (sv >= 0 && sv < 500 && debugStates && debugStates[sv]) {
      const dn = debugStates[sv].StateName || '';
      if (dn) stateName = dn;
    }
    const valDisplay = sv >= 0 && sv < 500 ? `S${sv}` : (sv === -1 ? '无效' : sv);
    h += `<tr>
<td>${i}</td>
<td style="font-family:var(--mono);font-size:11px">${v.toString(16).padStart(4,'0').toUpperCase()}</td>
<td><input type="text" value="${sv}" data-sa-idx="${i}" style="width:70px;text-align:center"></td>
<td style="color:var(--accent2);font-size:10px">${label}${stateName ? `<br><span style="color:var(--green);font-size:10px">→ ${valDisplay}: ${stateName}</span>` : (sv >= 0 ? `<br><span style="color:var(--text2);font-size:9px">→ ${valDisplay}</span>` : '')}</td>
</tr>`;
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
  
  // Bind change events
  wrap.querySelectorAll('input[data-sa-idx]').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = parseInt(inp.dataset.saIdx);
      let val = parseInt(inp.value) || 0;
      // Convert signed i16 back to unsigned for storage
      if (val < 0) val = val + 0x10000;
      val = Math.max(0, Math.min(65535, val));
      inp.value = val > 0x7FFF ? val - 0x10000 : val;  // show signed
      // Update hex
      const hex2 = model.Header.MysteryBlockHex || '';
      const bytes2 = hexToBytes(hex2);
      if (idx * 2 + 1 < bytes2.length) {
        bytes2[idx * 2] = val & 0xFF;
        bytes2[idx * 2 + 1] = (val >> 8) & 0xFF;
        model.Header.MysteryBlockHex = bytes2.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
        // Update hex display
        const row = inp.closest('tr');
        row.querySelector('td:nth-child(2)').textContent = val.toString(16).padStart(4,'0').toUpperCase();
      }
    });
  });
}

// Helper to convert hex string to byte array
function hexToBytes(hex) {
  return (hex || '').split(/\s+/).filter(Boolean).map(b => parseInt(b, 16) || 0);
}

function syncDebug() {
  if (!model || !debugStates.length) {
    toast(t('needDebug'), 'error');
    return;
  }
  for (const st of model.States) {
    const dbg = debugStates[st.Index];
    if (!dbg?.NextStates) continue;
    st.Transitions = dbg.NextStates.map(ns => {
      const digits = ns.NextStateName.replace(/\D/g, '');
      const target = parseInt(digits) || 0;
      return {
        StateIndex: target,
        Unk10: 0, Unk14: 0, Unk18: 0, Unk1C: 0,
        Conditions: (ns.Conditions || []).map(expr => ({
          Id: 0, Unk01: 0, Unk02: 0, Unk03: 0,
          Expression: expr,
          Unk08: 0, Unk09: 0, Unk0A: 0, Unk0B: 0, Unk0C: 0,
          DataHex: ''
        })),
        StructAbb: { Unk00: 0, Unk01: 1, Unk02: 0, Unk03: 0, Type: 0,
          BehaviorMatrixParam_f: 0, BehaviorMatrixParam_i: 0,
          Unk08_int: 0, Unk08_f: 0, Unk0C: 0, Unk10_int: 0,
          Unk14_int: 0, Unk18_int: 0, Unk1C_int: 0, Unk04: 0, Unk20_int: 0 }
      };
    });
  }
  buildNodes();
  toast(t('syncDebugDone'), 'success');
}

function buildStringList() {

function selectString(i) {
  selectedStringIndex = i;
  const el = document.getElementById('string-list');
  el.querySelectorAll('.str-item').forEach((d, j) => d.classList.toggle('active', j === i));
  document.getElementById('string-text').value = model?.Strings?.[i] || '';
}

// String edit: push history on blur (not every keystroke)
document.getElementById('string-text').addEventListener('blur', () => {
  if (selectedStringIndex < 0 || !model?.Strings) return;
  const v = document.getElementById('string-text').value;
  if (model.Strings[selectedStringIndex] !== v) {
    pushHistory();
    model.Strings[selectedStringIndex] = v;
    buildStringList();
  }
});
// Keep live sync on input (without pushing history)
document.getElementById('string-text').addEventListener('input', () => {
  if (selectedStringIndex < 0 || !model?.Strings) return;
  model.Strings[selectedStringIndex] = document.getElementById('string-text').value;
  buildStringList();
});

document.getElementById('strBtnAdd').addEventListener('click', () => {
  if (!model) return;
  if (!model.Strings) model.Strings = [];
  pushHistory();
  const idx = Math.max(0, selectedStringIndex);
  model.Strings.splice(idx + 1, 0, '');
  buildStringList();
  selectString(idx + 1);
});

document.getElementById('strBtnDel').addEventListener('click', () => {
  if (!model || selectedStringIndex < 0) return;
  pushHistory();
  model.Strings.splice(selectedStringIndex, 1);
  buildStringList();
  const newIdx = Math.min(selectedStringIndex, model.Strings.length - 1);
  selectString(newIdx >= 0 ? newIdx : -1);
});

document.getElementById('strBtnUp').addEventListener('click', () => {
  if (!model || selectedStringIndex <= 0) return;
  pushHistory();
  [model.Strings[selectedStringIndex - 1], model.Strings[selectedStringIndex]] =
    [model.Strings[selectedStringIndex], model.Strings[selectedStringIndex - 1]];
  buildStringList();
  selectString(selectedStringIndex - 1);
});

document.getElementById('strBtnDown').addEventListener('click', () => {
  if (!model || selectedStringIndex < 0 || selectedStringIndex >= model.Strings.length - 1) return;
  pushHistory();
  [model.Strings[selectedStringIndex], model.Strings[selectedStringIndex + 1]] =
    [model.Strings[selectedStringIndex + 1], model.Strings[selectedStringIndex]];
  buildStringList();
  selectString(selectedStringIndex + 1);
});

function updateStringStats() {
  const strings = model?.Strings || [];
  let sum = 2 + 2 * strings.length;
  for (const s of strings) sum += new TextEncoder().encode(s || '').length + 1;
  const warn = (sum - 2 - 2 * strings.length) > 0xFFFF;
  document.getElementById('string-stats').textContent = warn
    ? t("strOverflow") + " " + (sum - 2 - 2 * strings.length) + t("strOverflowEnd")
    : t("strOK") + " " + (sum - 2 - 2 * strings.length) + t("strOKEnd");
  document.getElementById('string-stats').style.color = warn ? 'var(--orange)' : 'var(--text2)';
}

// Tree layout: BFS from root nodes, layers by depth
function treeLayout() {
  if (nodes.length === 0) { toast('没有节点', 'error'); return; }
  const n = nodes.length;
  // Build adjacency and in-degree
  const nodeMap = new Map();
  for (let i = 0; i < n; i++) nodeMap.set(nodes[i].index, i);
  const adj = new Array(n).fill(null).map(() => []);
  const inDeg = new Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    const st = nodes[i].state;
    if (!st.Transitions) continue;
    for (const tr of st.Transitions) {
      const j = nodeMap.get(tr.StateIndex);
      if (j !== undefined && j !== i) {
        adj[i].push(j);
        inDeg[j]++;
      }
    }
  }
  // Roots: nodes with inDeg === 0 (or just first node if none)
  const roots = [];
  for (let i = 0; i < n; i++) {
    if (inDeg[i] === 0) roots.push(i);
  }
  if (roots.length === 0) roots.push(0);
  // BFS to assign layers
  const layer = new Array(n).fill(-1);
  const queue = [];
  for (const r of roots) { layer[r] = 0; queue.push(r); }
  while (queue.length > 0) {
    const u = queue.shift();
    for (const v of adj[u]) {
      if (layer[v] === -1) {
        layer[v] = layer[u] + 1;
        queue.push(v);
      }
    }
  }
  // Assign remaining nodes to deepest layer
  let maxLayer = Math.max(...layer.filter(l => l >= 0), 0);
  for (let i = 0; i < n; i++) {
    if (layer[i] === -1) layer[i] = ++maxLayer;
  }
  // Group by layer
  const layers = {};
  for (let i = 0; i < n; i++) {
    const l = layer[i];
    if (!layers[l]) layers[l] = [];
    layers[l].push(i);
  }
  // Position nodes — adaptive spacing
  const hSpacing = n > 150 ? 130 : n > 80 ? 155 : 180;
  const vSpacing = n > 150 ? 90 : n > 80 ? 115 : 140;
  const sortedLayers = Object.keys(layers).map(Number).sort((a,b) => a-b);
  for (const l of sortedLayers) {
    const row = layers[l];
    const totalW = row.length * hSpacing;
    const startX = 50 + Math.max(0, (sortedLayers.length > 0 ? 400 - totalW/2 : 0));
    row.forEach((idx, col) => {
      nodes[idx].x = startX + col * hSpacing;
      nodes[idx].y = 50 + l * vSpacing;
    });
  }
  drawCanvas();
  toast(t('treeDone') + ' (' + sortedLayers.length + t('treeLayers'), 'success');
}

// Force-directed layout
function forceLayout(iterations = 300) {
  if (nodes.length === 0) { toast('没有节点', 'error'); return; }
  toast(t('forceRunning'), 'info');
  const n = nodes.length;
  // Build edge list
  const edges = [];
  const nodeMap = new Map();
  for (let i = 0; i < n; i++) nodeMap.set(nodes[i].index, i);
  for (let i = 0; i < n; i++) {
    const st = nodes[i].state;
    if (!st.Transitions) continue;
    for (const tr of st.Transitions) {
      const j = nodeMap.get(tr.StateIndex);
      if (j !== undefined && j !== i) edges.push({ a: i, b: j });
    }
  }
  // More iterations for larger graphs
  const iters = n > 200 ? 500 : n > 100 ? 400 : iterations;
  const area = n * 12000;
  const k = Math.sqrt(area / n);
  // Init positions in a circle for better convergence
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i) / n;
    const r = k * Math.sqrt(n) * 0.3;
    nodes[i].x = 500 + r * Math.cos(angle);
    nodes[i].y = 400 + r * Math.sin(angle);
  }
  const temp0 = k * 3;
  let iter = iters;
  function step() {
    if (iter <= 0) { drawCanvas(); toast(t('forceDone'), 'success'); return; }
    const temp = temp0 * (iter / iters);
    const fx = new Array(n).fill(0);
    const fy = new Array(n).fill(0);
    // Repulsive
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        const f = k * k / dist;
        fx[i] -= (dx / dist) * f; fy[i] -= (dy / dist) * f;
        fx[j] += (dx / dist) * f; fy[j] += (dy / dist) * f;
      }
    }
    // Attractive
    for (const e of edges) {
      const dx = nodes[e.b].x - nodes[e.a].x;
      const dy = nodes[e.b].y - nodes[e.a].y;
      const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      const f = (dist * dist) / k;
      fx[e.a] += (dx / dist) * f; fy[e.a] += (dy / dist) * f;
      fx[e.b] -= (dx / dist) * f; fy[e.b] -= (dy / dist) * f;
    }
    // Apply
    for (let i = 0; i < n; i++) {
      const mag = Math.sqrt(fx[i] * fx[i] + fy[i] * fy[i]);
      if (mag < 0.01) continue;
      const scale = Math.min(mag, temp) / mag;
      nodes[i].x += fx[i] * scale;
      nodes[i].y += fy[i] * scale;
      nodes[i].x = Math.max(0, Math.min(4000, nodes[i].x));
      nodes[i].y = Math.max(0, Math.min(4000, nodes[i].y));
    }
    iter--;
    if (iter % 30 === 0 || iter < 5) drawCanvas();
    setTimeout(step, 1);
  }
  step();
}
