document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveBHV(); }
  if (e.ctrlKey && e.key === 'd') { e.preventDefault(); duplicateSelected(); }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchState').focus(); }
  if (e.key === 'Delete' && selectedNodes.size > 0) {
    e.preventDefault();
    const n = selectedNodes.size;
    const delIndices = [...selectedNodes].sort((a, b) => b - a);
    confirm(t('confirmDeleteMulti') + ' ' + n + ' ' + t('confirmDeleteMsgMulti'), () => {
      for (const idx of delIndices) {
      model.States.splice(idx, 1);
    }
    model.States.forEach((s, i) => s.Index = i);
    // Fix cross-references: remap Transition.StateIndex across all states
    const delSet = new Set(delIndices);
    for (const st of model.States) {
      if (!st.Transitions) continue;
      st.Transitions = st.Transitions.filter(tr => !delSet.has(tr.StateIndex));
      for (const tr of st.Transitions) {
        const shift = [...delIndices].filter(d => d < tr.StateIndex).length;
        tr.StateIndex -= shift;
      }
    }
    pushHistory();
    selectedNodes.clear();
    buildNodes();
    });
  }
  if (e.key === 'Escape') {
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
  }
});

async function init() {
  try {
    const resp = await api('GET', '/api/data');
    if (resp.status === 'ok' && resp.data) {
      model = resp.data;
      loadModel();
    }
    const dbgResp = await api('GET', '/api/debug');
    if (dbgResp.states) {
      debugStates = dbgResp.states;
    }
  } catch (e) {
    console.log('Backend not connected, waiting...');
  }
  drawCanvas();
}
let scene3d, camera3d, renderer3d, spheres3d = [], edges3d = [], is3d = false, ctrl3d = {};
init();
applyI18N();

function toggle3D() {
  is3d = !is3d;
  const c2d = document.getElementById('state-canvas');
  const c3d = document.getElementById('canvas3d');
  const mm = document.getElementById('minimap');
  const btn = document.getElementById('btn3dToggle');
  if (is3d) {
    c2d.style.display = 'none'; mm.style.display = 'none';
    c3d.style.display = 'block'; init3DScene();
    buildNodes(); build3DGraph();  // Rebuild from current 2D state
    if (btn) btn.textContent = t('toggle2DView');
  } else {
    c3d.style.display = 'none'; mm.style.display = 'block';
    c2d.style.display = 'block'; drawCanvas();
    if (btn) btn.textContent = t('toggle3DView');
  }
}

function init3DScene() {
  if (scene3d) return;
  const c3d = document.getElementById('canvas3d');
  const rect = c3d.parentElement.getBoundingClientRect();
  c3d.width = rect.width; c3d.height = rect.height;
  scene3d = new THREE.Scene();
  scene3d.background = new THREE.Color(0x181825);
  camera3d = new THREE.PerspectiveCamera(45, rect.width / Math.max(1, rect.height), 10, 20000);
  camera3d.position.set(800, 600, 1200);
  renderer3d = new THREE.WebGLRenderer({ canvas: c3d, antialias: true });
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio, 2));  // Sharp rendering
  renderer3d.setSize(rect.width, rect.height);
  scene3d.add(new THREE.GridHelper(3000, 30, 0x45475a, 0x282840));
  scene3d.add(new THREE.AmbientLight(0x404060));
  const dl = new THREE.DirectionalLight(0xffffff, 0.5);
  dl.position.set(1, 1, 1); scene3d.add(dl);
  const dl2 = new THREE.DirectionalLight(0x8899cc, 0.3);
  dl2.position.set(-0.5, -0.3, -1); scene3d.add(dl2);
  // Hemisphere light for ambient color variation
  scene3d.add(new THREE.HemisphereLight(0x8899cc, 0x282840, 0.25));
  c3d.addEventListener('mousedown', e => {
    ctrl3d.dragging = true; ctrl3d.lx = e.clientX; ctrl3d.ly = e.clientY;
    const rect2 = c3d.getBoundingClientRect();
    const mouse = new THREE.Vector2(((e.clientX-rect2.left)/rect2.width)*2-1, -((e.clientY-rect2.top)/rect2.height)*2+1);
    const rc = new THREE.Raycaster(); rc.setFromCamera(mouse, camera3d);
    const hits = rc.intersectObjects(spheres3d);
    if (hits.length > 0) {
      const obj = hits[0].object;
      const idx = obj.userData.index;
      const baseColor = obj.userData.nodeColor || 0x89b4fa;
      const baseEmissive = new THREE.Color(baseColor).multiplyScalar(0.2);
      spheres3d.forEach(s => {
        const isTarget = s.userData.index === idx;
        const c = s.userData.nodeColor || 0x89b4fa;
        s.material.emissive = isTarget ? new THREE.Color(c).multiplyScalar(0.5) : new THREE.Color(c).multiplyScalar(0.2);
      });
      // Dbl-click: switch to 2D and focus
      if (ctrl3d._lastClick && Date.now() - ctrl3d._lastClick < 400) {
        toggle3D();
        jumpToState(idx);
      }
      ctrl3d._lastClick = Date.now();
    }
  });
  c3d.addEventListener('mousemove', e => {
    if (!ctrl3d.dragging) return;
    const dx = e.clientX - ctrl3d.lx, dy = e.clientY - ctrl3d.ly;
    ctrl3d.lx = e.clientX; ctrl3d.ly = e.clientY;
    const t = ctrl3d.target || {x:400,y:300,z:0};
    if (e.shiftKey) { camera3d.position.x -= dx*2; camera3d.position.y += dy*2; }
    else {
      const r = Math.sqrt((camera3d.position.x-t.x)**2+(camera3d.position.z-t.z)**2);
      let a = Math.atan2(camera3d.position.z-t.z, camera3d.position.x-t.x) + dx*0.005;
      camera3d.position.x = t.x + r*Math.cos(a);
      camera3d.position.z = t.z + r*Math.sin(a);
      camera3d.position.y = Math.max(50, Math.min(5000, camera3d.position.y - dy*2));
    }
    camera3d.lookAt(t.x, t.y||300, t.z||0);
  });
  c3d.addEventListener('mouseup', () => { ctrl3d.dragging = false; });
  c3d.addEventListener('wheel', e => {
    e.preventDefault();
    const t = ctrl3d.target || {x:400,y:300,z:0};
    const dx = camera3d.position.x-t.x, dy = camera3d.position.y-t.y, dz = camera3d.position.z-t.z;
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    const nd = Math.max(100, Math.min(8000, d*(e.deltaY>0?1.1:0.9)));
    camera3d.position.x = t.x + (dx/d)*nd; camera3d.position.y = t.y + (dy/d)*nd; camera3d.position.z = t.z + (dz/d)*nd;
    camera3d.lookAt(t.x, t.y, t.z);
  });
  animate3D();
}

function build3DGraph() {
  spheres3d.forEach(s => { s.children.forEach(c => { if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose(); }); if(s.geometry)s.geometry.dispose(); if(s.material)s.material.dispose(); scene3d.remove(s); });
  edges3d.forEach(e => { if(e.geometry)e.geometry.dispose(); if(e.material)e.material.dispose(); scene3d.remove(e); });
  spheres3d = []; edges3d = [];
  if (nodes.length === 0) return;
  const n = nodes.length;
  const nm = new Map(); nodes.forEach((nd,i) => nm.set(nd.index,i));
  
  // Vibrant palette — saturated enough for dark bg
  const PALETTE = [0x74c7ec, 0xa6e3a1, 0xf9e2af, 0xfab387, 0xf38ba8, 0xcba6f7, 0x94e2d5, 0xb4befe, 0xf5c2e7, 0x89dceb];
  
  // Force layout from 2D positions, spread Z
  const pos = nodes.map(nd => ({x: nd.x || 400, y: nd.y || 300, z: (Math.random()-0.5)*400}));
  const k = Math.sqrt(14000 * n / Math.max(1, n));
  const iters = n > 150 ? 100 : n > 60 ? 70 : 45;
  for (let iter=0; iter<iters; iter++) {
    const temp = k * 3 * (1 - iter/iters);
    const fx=new Array(n).fill(0),fy=new Array(n).fill(0),fz=new Array(n).fill(0);
    for (let i=0;i<n;i++) for (let j=i+1;j<n;j++) {
      const dx=pos[j].x-pos[i].x,dy=pos[j].y-pos[i].y,dz=pos[j].z-pos[i].z;
      const dist=Math.max(1,Math.sqrt(dx*dx+dy*dy+dz*dz));
      const f=k*k/dist; fx[i]-=(dx/dist)*f;fy[i]-=(dy/dist)*f;fz[i]-=(dz/dist)*f;
      fx[j]+=(dx/dist)*f;fy[j]+=(dy/dist)*f;fz[j]+=(dz/dist)*f;
    }
    for (const nd of nodes) {
      const i=nm.get(nd.index); if(i===undefined)continue;
      const st=nd.state; if(!st?.Transitions)continue;
      for (const tr of st.Transitions) {
        const j=nm.get(tr.StateIndex); if(j===undefined||j===i)continue;
        const dx=pos[j].x-pos[i].x,dy=pos[j].y-pos[i].y,dz=pos[j].z-pos[i].z;
        const dist=Math.max(1,Math.sqrt(dx*dx+dy*dy+dz*dz));
        const f=(dist*dist)/k;
        fx[i]+=(dx/dist)*f;fy[i]+=(dy/dist)*f;fz[i]+=(dz/dist)*f;
        fx[j]-=(dx/dist)*f;fy[j]-=(dy/dist)*f;fz[j]-=(dz/dist)*f;
      }
    }
    for (let i=0;i<n;i++) {
      const m=Math.sqrt(fx[i]*fx[i]+fy[i]*fy[i]+fz[i]*fz[i]);
      if(m<0.01)continue; const s=Math.min(m,temp)/m;
      pos[i].x+=fx[i]*s;pos[i].y+=fy[i]*s;pos[i].z+=fz[i]*s;
    }
  }
  
  // Sphere size varied by transition count — more transitions = bigger
  const sphereCache = {};
  function sphereGeo(trCnt) {
    const r = trCnt > 5 ? 20 : trCnt > 0 ? 17 : 14;
    const key = ''+r;
    if (!sphereCache[key]) sphereCache[key] = new THREE.SphereGeometry(r, 32, 32);
    return sphereCache[key];
  }
  
  nodes.forEach((nd,i) => {
    const hasDbg = !!nd.dbgName;
    const st = nd.state;
    const sb1 = (model?.StructBs || [])[st?.StructBid];
    const anim1 = sb1?.Unk00 ?? -1;
    const trCnt = st?.Transitions?.length || 0;
    const cIdx = ((anim1 % PALETTE.length) + PALETTE.length) % PALETTE.length;
    const nodeColor = hasDbg ? 0xa6e3a1 : PALETTE[cIdx];
    const colorHex = nodeColor.toString(16).padStart(6,'0');
    
    const mat = new THREE.MeshPhongMaterial({
      color: nodeColor,
      emissive: new THREE.Color(nodeColor).multiplyScalar(0.25),
      specular: 0x666666,
      shininess: 50,
    });
    const geo = sphereGeo(trCnt);
    const sp = new THREE.Mesh(geo, mat);
    sp.position.set(pos[i].x, pos[i].y, pos[i].z);
    sp.userData = {index: nd.index, anim1, trCnt, hasDbg, nodeColor};
    scene3d.add(sp); spheres3d.push(sp);
    
    // Glow ring around sphere
    const ringGeo = new THREE.TorusGeometry(geo.parameters.radius + 2, 1.2, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({color: nodeColor, transparent: true, opacity: 0.35, depthWrite: false});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    sp.add(ring);
    
    // Compact label (matching 2D style)
    const cvs = document.createElement('canvas');
    cvs.width = 512; cvs.height = 128;
    const cx = cvs.getContext('2d');
    cx.fillStyle = 'rgba(12,12,22,0.95)';
    const bw = 440, bh = 96, bx = 36, by = 16;
    cx.beginPath(); cx.moveTo(bx+12,by); cx.lineTo(bx+bw-12,by);
    cx.quadraticCurveTo(bx+bw,by,bx+bw,by+12); cx.lineTo(bx+bw,by+bh-12);
    cx.quadraticCurveTo(bx+bw,by+bh,bx+bw-12,by+bh); cx.lineTo(bx+12,by+bh);
    cx.quadraticCurveTo(bx,by+bh,bx,by+bh-12); cx.lineTo(bx,by+12);
    cx.quadraticCurveTo(bx,by,bx+12,by);
    cx.fill();
    cx.strokeStyle = '#' + colorHex;
    cx.lineWidth = 5; cx.stroke();
    cx.fillStyle = '#ffffff';
    cx.font = 'bold 48px "Segoe UI", sans-serif';
    cx.textAlign = 'center';
    cx.fillText('S' + nd.index, 256, 52);
    cx.fillStyle = '#' + colorHex;
    cx.font = '28px "Segoe UI", sans-serif';
    cx.fillText('A1:' + anim1 + (trCnt ? '  →'+trCnt : ''), 256, 88);
    
    const tex = new THREE.CanvasTexture(cvs);
    tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter; tex.generateMipmaps = false;
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(0, geo.parameters.radius + 20, 0);
    sprite.scale.set(70, 18, 1);
    sprite.userData = { isLabel: true, baseDist: 70 };
    sp.add(sprite);
  });
  
  // Curved tubes with arrow cones
  nodes.forEach((nd,i) => {
    const st = nd.state; if(!st?.Transitions)return;
    for (const tr of st.Transitions) {
      const j = nm.get(tr.StateIndex); if(j===undefined||j===i)continue;
      const cc = tr.Conditions?.length||0;
      const edgeColor = cc>5?0xf38ba8:cc>0?0x74c7ec:0x9399b2;
      const tubeRadius = cc>5?2.5:cc>0?2:1.2;
      const opacity = cc>5?0.8:cc>0?0.55:0.3;
      
      const p1 = new THREE.Vector3(pos[i].x, pos[i].y, pos[i].z);
      const p2 = new THREE.Vector3(pos[j].x, pos[j].y, pos[j].z);
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      const dist = p1.distanceTo(p2);
      const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
      const perp = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
      mid.add(perp.multiplyScalar(dist * 0.1));
      
      const curve = new THREE.QuadraticBezierCurve3(p1.clone(), mid, p2.clone());
      const tubeGeo = new THREE.TubeGeometry(curve, 16, tubeRadius, 8, false);
      const tubeMat = new THREE.MeshPhongMaterial({
        color: edgeColor,
        emissive: new THREE.Color(edgeColor).multiplyScalar(0.2),
        transparent: true, opacity, depthWrite: true
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      scene3d.add(tube); edges3d.push(tube);
      
      // Arrow cone at end of tube
      const endPt = curve.getPoint(0.92);
      const endTangent = curve.getTangent(0.92).normalize();
      const coneGeo = new THREE.ConeGeometry(tubeRadius * 2, tubeRadius * 5, 6);
      const coneMat = new THREE.MeshPhongMaterial({color: edgeColor, emissive: new THREE.Color(edgeColor).multiplyScalar(0.2)});
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.position.copy(endPt);
      // Align cone with tangent
      cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), endTangent);
      scene3d.add(cone); edges3d.push(cone);
    }
  });
  
  const cx=pos.reduce((s,p)=>s+p.x,0)/n, cy=pos.reduce((s,p)=>s+p.y,0)/n, cz=pos.reduce((s,p)=>s+p.z,0)/n;
  ctrl3d.target = {x:cx,y:cy,z:cz};
  camera3d.position.set(cx+400, cy+500, cz+700); camera3d.lookAt(cx,cy,cz);
}

function animate3D() { if(!is3d){requestAnimationFrame(animate3D);return;}
  // Auto-resize on window change
  const c3d = document.getElementById('canvas3d');
  const rect = c3d.parentElement.getBoundingClientRect();
  if (Math.abs(c3d.width - rect.width) > 2 || Math.abs(c3d.height - rect.height) > 2) {
    c3d.width = rect.width; c3d.height = rect.height;
    if (renderer3d) {
      renderer3d.setSize(rect.width, rect.height);
      camera3d.aspect = rect.width / Math.max(1, rect.height);
      camera3d.updateProjectionMatrix();
    }
  }
  // Scale labels to maintain readability
  spheres3d.forEach(sp => {
    sp.children.forEach(child => {
      if (child.userData?.isLabel) {
        const dist = camera3d.position.distanceTo(sp.position);
        const s = Math.max(0.3, Math.min(2, dist / 800));
        child.scale.set(child.userData.baseDist * s * 1.5, child.userData.baseDist * s * 0.35, 1);
      }
    });
  });
  renderer3d.render(scene3d,camera3d); requestAnimationFrame(animate3D); }
